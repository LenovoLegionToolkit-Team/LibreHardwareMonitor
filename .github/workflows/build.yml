name: Build and Prerelease

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    name: Build & Prerelease
    runs-on: windows-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Determine Version
        id: get_version
        run: |
          $githubVersionStr = ""
          try {
            $env:GH_TOKEN = "${{ secrets.GITHUB_TOKEN }}"
            $githubVersionStr = gh release view --json tagName --template '{{.tagName}}' 2>$null
            if ($githubVersionStr -match '^v?(\d+\.\d+\.\d+.*)$') {
              $githubVersionStr = $Matches[1]
            }
          } catch {
            # No release found or command failed
          }

          $propsPath = "Directory.Build.props"
          [xml]$xml = Get-Content $propsPath
          $csprojVersionStr = $xml.Project.PropertyGroup.Version
          if (!$csprojVersionStr) {
            $csprojVersionStr = "1.0.0"
          }

          $githubVersion = $null
          if ($githubVersionStr) {
            $githubVersion = [version]$githubVersionStr
          }
          $csprojVersion = [version]$csprojVersionStr

          $baseVersion = $csprojVersion
          if ($githubVersion -and $githubVersion -ge $csprojVersion) {
            $baseVersion = [version]::new($githubVersion.Major, $githubVersion.Minor, ($githubVersion.Build + 1))
          }

          $finalVersion = "$($baseVersion.ToString(3))-pre${{ github.run_number }}"
          echo "version=$finalVersion" >> $env:GITHUB_OUTPUT
        shell: powershell

      - name: Restore Dependencies
        run: dotnet restore LibreHardwareMonitorLib\LibreHardwareMonitorLib.csproj -p:Platform=x64

      - name: Build
        run: dotnet build LibreHardwareMonitorLib\LibreHardwareMonitorLib.csproj -c Release /p:Version=${{ steps.get_version.outputs.version }} -p:Platform=x64

      - name: Pack
        run: dotnet pack LibreHardwareMonitorLib\LibreHardwareMonitorLib.csproj -c Release /p:Version=${{ steps.get_version.outputs.version }} -o Release -p:Platform=x64

      - name: NuGet login
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: NuGet/login@v1
        id: login
        with:
          user: LenovoLegionToolkit-Team

      - name: Push to NuGet.org
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: dotnet nuget push Release\*.nupkg --source https://api.nuget.org/v3/index.json --skip-duplicate --api-key ${{ steps.login.outputs.NUGET_API_KEY }}
