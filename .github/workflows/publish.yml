name: Publish NuGet Package

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'NuGet version (e.g., 1.0.0)'
        required: true
        type: string

jobs:
  publish:
    name: Build, Pack, and Publish
    runs-on: windows-latest
    permissions:
      id-token: write
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Pack
        run: dotnet pack LibreHardwareMonitorLib\LibreHardwareMonitorLib.csproj -c Release -o Release /p:Version=${{ github.event.inputs.version }} /p:Platform=x64 /p:RuntimeIdentifier=win-x64

      - name: NuGet login (OIDC)
        uses: NuGet/login@v1
        id: login
        with:
          user: Kaguya

      - name: Push to NuGet.org
        run: dotnet nuget push Release\*.nupkg --source https://api.nuget.org/v3/index.json --skip-duplicate --api-key ${{ steps.login.outputs.NUGET_API_KEY }}

      - name: Create GitHub Release and upload .nupkg
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: v${{ github.event.inputs.version }}
          generate_release_notes: true
          files: Release\*.nupkg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
