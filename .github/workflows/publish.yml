name: Publish NuGet Package (.NET 9.0 only)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'NuGet version (e.g., 1.0.0)'
        required: true
        type: string

jobs:
  publish:
    name: Build, Pack, and Publish
    runs-on: windows-latest
    permissions:
      id-token: write
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup .NET 9.0
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Clean
        run: dotnet clean LibreHardwareMonitorLib\LibreHardwareMonitorLib.csproj -c Release

      - name: Pack NuGet package
        run: >
          dotnet pack LibreHardwareMonitorLib\LibreHardwareMonitorLib.csproj 
          -c Release 
          -o Release 
          /p:Version=${{ github.event.inputs.version }} 
          /p:TargetFrameworks=net9.0 
          /p:OutputPath=bin\Release\

      - name: Verify package created
        run: dir Release\*.nupkg
        shell: cmd

      - name: NuGet login (OIDC)
        uses: NuGet/login@v1
        id: login
        with:
          user: Kaguya

      - name: Push to NuGet.org
        run: dotnet nuget push Release\*.nupkg --source https://api.nuget.org/v3/index.json --skip-duplicate --api-key ${{ steps.login.outputs.NUGET_API_KEY }}

      - name: Create GitHub Release and upload .nupkg
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: v${{ github.event.inputs.version }}
          generate_release_notes: true
          files: Release\*.nupkg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
